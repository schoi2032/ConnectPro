<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectMailPro | Professional Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            color: #0f172a;
        }

        .glass-sidebar {
            background: #0f172a;
            color: #94a3b8;
        }

        .active-nav {
            background: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            border-right: 3px solid #3b82f6;
        }

        .mail-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid #f1f5f9;
        }

        .mail-card:hover {
            background-color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.05);
        }

        .mail-card.selected {
            background-color: #ffffff;
            border-left: 4px solid var(--primary);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">

    <!-- Auth / Setup Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl animate-in">
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mb-4 shadow-xl shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">ConnectMailPro</h1>
                <p class="text-slate-500 text-sm mt-1">Set up your local professional identity</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">Display Name</label>
                    <input type="text" id="setup-name" placeholder="E.g. Alex Rivera" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-medium">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 block">Mail Handle</label>
                    <div class="relative">
                        <input type="text" id="setup-handle" placeholder="username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-medium pr-32">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">@connect.pro</span>
                    </div>
                </div>
                <button onclick="finishSetup()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all mt-4">
                    Lock In & Start
                </button>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app-container" class="hidden flex h-full w-full opacity-0 transition-opacity duration-500">
        <!-- Sidebar -->
        <aside class="w-72 glass-sidebar flex flex-col shrink-0">
            <div class="p-8 flex items-center gap-3">
                <div class="text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <span class="font-bold text-xl text-white tracking-tight">ConnectMail</span>
            </div>

            <div class="px-6 mb-8">
                <button onclick="openCompose()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-900/40 transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    New Message
                </button>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <button onclick="switchFolder('inbox')" id="nav-inbox" class="active-nav w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    <span class="text-sm font-semibold">Inbox</span>
                    <span id="unread-count" class="ml-auto bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
                </button>
                <button onclick="switchFolder('sent')" id="nav-sent" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    <span class="text-sm font-semibold">Sent</span>
                </button>
            </nav>

            <div class="p-6 bg-white/5 mt-auto border-t border-white/5">
                <div class="flex items-center gap-3">
                    <div id="user-avatar-small" class="avatar-circle bg-blue-500 text-sm">??</div>
                    <div class="flex flex-col min-w-0">
                        <span id="user-name-display" class="text-xs font-bold text-white truncate">User</span>
                        <span id="user-email-display" class="text-[10px] text-slate-500 truncate">handle@connect.pro</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Header -->
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <h2 id="current-folder-name" class="text-xl font-bold text-slate-900">Inbox</h2>
                    <div class="h-5 w-[1px] bg-slate-200 mx-2"></div>
                    <div class="flex items-center gap-1 text-green-500 font-bold text-[10px] uppercase tracking-widest">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                        Client Direct
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="clearAllData()" class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-tighter">Reset All</button>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <!-- List Panel -->
                <section class="w-96 border-r border-slate-200 flex flex-col bg-slate-50/50 shrink-0">
                    <div id="mail-list" class="flex-1 overflow-y-auto custom-scroll">
                        <!-- Items injected here -->
                    </div>
                </section>

                <!-- Reader Panel -->
                <section class="flex-1 bg-white overflow-y-auto custom-scroll">
                    <div id="no-selection" class="h-full flex flex-col items-center justify-center p-12 text-center">
                        <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </div>
                        <h3 class="font-bold text-slate-900">No message selected</h3>
                        <p class="text-sm text-slate-400 mt-1">Select a thread from the list to read its content.</p>
                    </div>

                    <div id="reader-content" class="hidden p-12 max-w-4xl mx-auto animate-in">
                        <h1 id="read-subject" class="text-3xl font-extrabold text-slate-900 mb-8 leading-tight">Subject Line</h1>
                        <div class="flex items-center gap-4 mb-8 pb-8 border-b border-slate-100">
                            <div id="read-avatar" class="avatar-circle bg-slate-900 h-12 w-12 text-lg">?</div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p id="read-from-name" class="font-bold text-slate-900">Sender Name</p>
                                        <p id="read-from-email" class="text-xs text-slate-500 font-medium"></p>
                                    </div>
                                    <span id="read-date" class="text-[10px] font-bold text-slate-400 uppercase">Just now</span>
                                </div>
                            </div>
                        </div>
                        <div id="read-body" class="text-slate-700 leading-relaxed whitespace-pre-wrap text-lg">
                            Message content goes here...
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeCompose()"></div>
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl relative animate-in overflow-hidden flex flex-col">
            <div class="p-8 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                    </div>
                    <h2 class="font-bold text-xl text-slate-900">New Message</h2>
                </div>
                <button onclick="closeCompose()" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="p-8 space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">To Recipient</label>
                    <div class="relative">
                        <input id="comp-to" type="text" placeholder="username" class="w-full px-5 py-3 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-medium pr-32 bg-slate-50/50">
                        <span class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">@connect.pro</span>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Subject</label>
                    <input id="comp-subject" type="text" placeholder="Meeting Notes" class="w-full px-5 py-3 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-medium bg-slate-50/50">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Message</label>
                    <textarea id="comp-body" placeholder="Hi there..." class="w-full h-48 px-5 py-4 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-medium bg-slate-50/50 resize-none"></textarea>
                </div>
            </div>

            <div class="p-8 bg-slate-50 border-t border-slate-100 flex justify-end gap-4">
                <button onclick="closeCompose()" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:text-slate-800 transition-colors">Discard</button>
                <button onclick="sendMail()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-xl font-bold shadow-lg shadow-blue-200 flex items-center gap-2 transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    Send Now
                </button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentUser = null;
        let mails = [];
        let activeFolder = 'inbox';
        let selectedMailId = null;

        // Colors for avatars
        const avatarColors = ['#2563eb', '#7c3aed', '#db2777', '#dc2626', '#ea580c', '#16a34a', '#0891b2'];

        // Core Functions
        function init() {
            const savedUser = localStorage.getItem('cp_user');
            const savedMails = localStorage.getItem('cp_mails');

            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                mails = savedMails ? JSON.parse(savedMails) : [];
                startApp();
            }
        }

        function finishSetup() {
            const name = document.getElementById('setup-name').value.trim();
            const handle = document.getElementById('setup-handle').value.trim().toLowerCase();

            if (!name || !handle) return;

            currentUser = {
                name: name,
                handle: handle,
                email: handle + '@connect.pro',
                color: avatarColors[Math.floor(Math.random() * avatarColors.length)]
            };

            localStorage.setItem('cp_user', JSON.stringify(currentUser));
            
            // Add a welcome email
            const welcomeEmail = {
                id: Date.now(),
                senderName: "System Administrator",
                senderEmail: "admin@connect.pro",
                senderColor: "#0f172a",
                recipient: currentUser.email,
                subject: "Welcome to ConnectMailPro",
                body: `Hello ${name},\n\nWelcome to your new professional mailbox. This application works entirely in your browser. \n\nYou can send messages to anyone with a @connect.pro handle. Since this is a direct simulation, messages you send to yourself will appear in your inbox instantly!\n\nBest regards,\nThe ConnectMail Team`,
                date: new Date().toISOString(),
                unread: true
            };
            
            mails = [welcomeEmail];
            localStorage.setItem('cp_mails', JSON.stringify(mails));
            
            startApp();
        }

        function startApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            const container = document.getElementById('app-container');
            container.classList.remove('hidden');
            setTimeout(() => container.style.opacity = '1', 10);

            // Set UI details
            document.getElementById('user-name-display').textContent = currentUser.name;
            document.getElementById('user-email-display').textContent = currentUser.email;
            
            const smallAvatar = document.getElementById('user-avatar-small');
            smallAvatar.textContent = currentUser.name.charAt(0);
            smallAvatar.style.backgroundColor = currentUser.color;

            renderMailList();
        }

        function renderMailList() {
            const list = document.getElementById('mail-list');
            list.innerHTML = '';

            const filtered = mails.filter(m => {
                if (activeFolder === 'inbox') return m.recipient === currentUser.email;
                if (activeFolder === 'sent') return m.senderEmail === currentUser.email;
                return false;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-30 p-12 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <p class="font-bold text-xs uppercase tracking-widest">Folder Empty</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(m => {
                const isSelected = selectedMailId === m.id;
                const div = document.createElement('div');
                div.className = `mail-card p-6 cursor-pointer ${isSelected ? 'selected' : ''}`;
                div.onclick = () => selectMail(m);

                const timeStr = new Date(m.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const name = activeFolder === 'inbox' ? m.senderName : `To: ${m.recipient.split('@')[0]}`;
                const unreadClass = (activeFolder === 'inbox' && m.unread) ? 'font-bold' : '';

                div.innerHTML = `
                    <div class="flex gap-4">
                        <div class="avatar-circle shrink-0" style="background-color: ${m.senderColor || '#94a3b8'}">
                            ${name.charAt(0)}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="text-xs ${unreadClass ? 'text-slate-900' : 'text-slate-500'} truncate">${name}</span>
                                <span class="text-[10px] font-bold text-slate-400">${timeStr}</span>
                            </div>
                            <h4 class="text-xs ${unreadClass ? 'font-extrabold text-slate-900' : 'font-semibold text-slate-700'} truncate">${m.subject}</h4>
                            <p class="text-[11px] text-slate-400 truncate mt-1 leading-tight">${m.body.substring(0, 60)}...</p>
                        </div>
                        ${unreadClass ? '<div class="w-2 h-2 bg-blue-600 rounded-full mt-2"></div>' : ''}
                    </div>
                `;
                list.appendChild(div);
            });

            updateUnreadCount();
        }

        function selectMail(mail) {
            selectedMailId = mail.id;
            
            // Mark as read
            if (mail.unread && activeFolder === 'inbox') {
                mail.unread = false;
                localStorage.setItem('cp_mails', JSON.stringify(mails));
            }

            renderMailList();

            document.getElementById('no-selection').classList.add('hidden');
            const reader = document.getElementById('reader-content');
            reader.classList.remove('hidden');
            reader.classList.remove('animate-in');
            void reader.offsetWidth; // Trigger reflow
            reader.classList.add('animate-in');

            document.getElementById('read-subject').textContent = mail.subject;
            document.getElementById('read-from-name').textContent = mail.senderName;
            document.getElementById('read-from-email').textContent = `<${mail.senderEmail}>`;
            document.getElementById('read-body').textContent = mail.body;
            document.getElementById('read-date').textContent = new Date(mail.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
            
            const avatar = document.getElementById('read-avatar');
            avatar.textContent = mail.senderName.charAt(0);
            avatar.style.backgroundColor = mail.senderColor;
        }

        function switchFolder(folder) {
            activeFolder = folder;
            selectedMailId = null;
            
            // Update Nav UI
            document.getElementById('nav-inbox').className = folder === 'inbox' ? 'active-nav w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all' : 'w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 transition-all';
            document.getElementById('nav-sent').className = folder === 'sent' ? 'active-nav w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all' : 'w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 transition-all';
            
            document.getElementById('current-folder-name').textContent = folder === 'inbox' ? 'Inbox' : 'Sent Items';
            
            document.getElementById('reader-content').classList.add('hidden');
            document.getElementById('no-selection').classList.remove('hidden');
            
            renderMailList();
        }

        function openCompose() {
            document.getElementById('compose-modal').classList.remove('hidden');
        }

        function closeCompose() {
            document.getElementById('compose-modal').classList.add('hidden');
            document.getElementById('comp-to').value = '';
            document.getElementById('comp-subject').value = '';
            document.getElementById('comp-body').value = '';
        }

        function sendMail() {
            const to = document.getElementById('comp-to').value.trim().toLowerCase();
            const subject = document.getElementById('comp-subject').value.trim();
            const body = document.getElementById('comp-body').value.trim();

            if (!to || !subject || !body) return;

            const fullTo = to.includes('@') ? to : to + '@connect.pro';

            const newMail = {
                id: Date.now(),
                senderName: currentUser.name,
                senderEmail: currentUser.email,
                senderColor: currentUser.color,
                recipient: fullTo,
                subject: subject,
                body: body,
                date: new Date().toISOString(),
                unread: true
            };

            mails.push(newMail);
            localStorage.setItem('cp_mails', JSON.stringify(mails));

            closeCompose();
            
            // Switch to sent folder to see the result
            switchFolder('sent');
            selectMail(newMail);
        }

        function updateUnreadCount() {
            const count = mails.filter(m => m.recipient === currentUser.email && m.unread).length;
            const badge = document.getElementById('unread-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function clearAllData() {
            if(confirm("Are you sure? This will wipe your profile and all messages.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Run app
        init();
    </script>
</body>
</html>
