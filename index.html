<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPro | Safe and Secure Connections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .email-item.active {
            background-color: white;
            border-left: 4px solid #2563eb;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
        }

        .avatar-option {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .avatar-option.selected {
            border-color: #2563eb;
            transform: scale(1.1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        .account-card:hover {
            transform: translateY(-2px);
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen">

    <!-- Auth / Login View -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
        <div id="login-container" class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-slide-up max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex flex-col items-center text-center mb-6">
                <div class="bg-blue-600 p-4 rounded-2xl text-white mb-4 shadow-lg shadow-blue-200">
                    <i data-lucide="mail" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">ConnectMailPro</h1>
                <p class="text-slate-500 mt-2">Sign in to your local account</p>
            </div>

            <!-- Existing Accounts List -->
            <div id="accounts-list-section" class="mb-6 hidden">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Saved Accounts</label>
                <div id="accounts-grid" class="space-y-2">
                    <!-- Accounts injected here -->
                </div>
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-100"></span></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400 font-medium">Or</span></div>
                </div>
            </div>
            
            <button onclick="showRegistration()" class="w-full flex items-center justify-center gap-2 border-2 border-dashed border-slate-200 hover:border-blue-400 hover:text-blue-500 text-slate-500 font-medium py-3 rounded-xl transition-all mb-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i>
                Create New Account
            </button>
        </div>

        <!-- Registration Step (Hidden by default) -->
        <div id="register-container" class="hidden bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-slide-up max-h-[90vh] overflow-y-auto custom-scrollbar">
            <button onclick="showLogin()" class="mb-4 text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Login
            </button>
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold">Create Account</h2>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3 text-center">Choose your Profile Picture</label>
                    <div id="avatar-grid" class="grid grid-cols-4 gap-3"></div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Your Name</label>
                    <input type="text" id="reg-name" placeholder="Alex Smith" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Desired Email Address</label>
                    <div class="relative">
                        <input type="text" id="reg-email" placeholder="alex" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all pr-32">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">@connect.pro</span>
                    </div>
                </div>
                <button onclick="registerUser()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-200">
                    Start Messaging
                </button>
            </div>
        </div>
    </div>

    <!-- Main Application UI -->
    <div id="main-app" class="hidden flex h-full w-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-900 text-slate-300 transition-all duration-300 flex flex-col border-r border-slate-800">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                </div>
                <span class="sidebar-text font-bold text-xl text-white tracking-tight">ConnectMail</span>
            </div>

            <div class="px-4 mb-6">
                <button onclick="toggleCompose(true)" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl transition-all shadow-lg shadow-blue-900/20 w-full py-3 px-4">
                    <i data-lucide="plus"></i>
                    <span class="sidebar-text font-medium">Compose</span>
                </button>
            </div>

            <nav class="flex-1 px-3 space-y-1">
                <button onclick="switchFolder('inbox')" id="btn-inbox" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-colors bg-blue-600/10 text-blue-400">
                    <i data-lucide="inbox" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium text-sm">Inbox</span>
                </button>
                <button onclick="switchFolder('sent')" id="btn-sent" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-colors hover:bg-slate-800 text-slate-400">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium text-sm">Sent</span>
                </button>
                <button onclick="switchFolder('starred')" id="btn-starred" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-colors hover:bg-slate-800 text-slate-400">
                    <i data-lucide="star" class="w-5 h-5"></i>
                    <span class="sidebar-text font-medium text-sm">Starred</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <img id="display-avatar" src="" class="w-9 h-9 rounded-full border-2 border-slate-700 bg-slate-800 object-cover" alt="Profile">
                    <div class="sidebar-text flex flex-col min-w-0 flex-1">
                        <span id="display-name" class="text-xs font-semibold text-white truncate">User Name</span>
                        <span id="display-email" class="text-[10px] text-slate-500 truncate">email@connect.pro</span>
                    </div>
                    <button onclick="logout()" class="sidebar-text p-1 hover:text-white transition-colors" title="Logout">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 bg-white">
            <header class="h-16 border-b border-slate-100 flex items-center justify-between px-6">
                <div class="flex items-center gap-4 flex-1">
                    <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 id="folder-title" class="font-bold text-lg text-slate-800 capitalize">Inbox</h2>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <section class="w-full lg:w-[380px] border-r border-slate-100 flex flex-col bg-slate-50/50">
                    <div id="email-list" class="flex-1 overflow-y-auto custom-scrollbar"></div>
                </section>

                <section class="hidden lg:flex flex-1 flex-col bg-white overflow-y-auto custom-scrollbar">
                    <div id="empty-view" class="flex-1 flex flex-col items-center justify-center text-slate-300 p-12">
                        <i data-lucide="mail-open" class="w-16 h-16 mb-4 opacity-20"></i>
                        <p class="font-medium text-slate-400">Select an email to view</p>
                    </div>
                    <div id="active-view" class="hidden flex flex-col h-full animate-slide-up">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                            <div class="flex gap-2">
                                <button onclick="deleteCurrentEmail()" class="p-2 hover:bg-red-50 text-red-400 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                <button onclick="toggleStarCurrent()" id="star-btn" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="star" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                        <div class="p-8 max-w-3xl mx-auto w-full">
                            <h1 id="view-subject" class="text-3xl font-bold text-slate-900 mb-6">Subject Line</h1>
                            <div class="flex items-center gap-4 mb-8">
                                <img id="view-avatar-img" src="" class="w-12 h-12 rounded-2xl border border-slate-100 object-cover" alt="Sender">
                                <div>
                                    <p id="view-from" class="font-bold text-slate-900">Sender Name</p>
                                    <p class="text-xs text-slate-500">to <span class="font-medium text-blue-600">me</span></p>
                                </div>
                                <span id="view-date" class="ml-auto text-xs text-slate-400 italic">Date</span>
                            </div>
                            <div id="view-body" class="text-slate-700 leading-relaxed whitespace-pre-wrap text-lg"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-slide-up">
            <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
                <span class="font-bold">Compose Message</span>
                <button onclick="toggleCompose(false)" class="hover:bg-white/20 p-1 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <input id="to-email" type="text" placeholder="Recipient address (e.g. friend@connect.pro)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="to-subject" type="text" placeholder="Subject" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea id="to-body" placeholder="Write your message here..." class="w-full h-48 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
            </div>
            <div class="p-4 bg-slate-50 flex justify-end gap-3">
                <button onclick="toggleCompose(false)" class="px-6 py-2 text-slate-500 font-medium hover:text-slate-700">Cancel</button>
                <button onclick="sendMail()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-xl font-bold transition-all shadow-lg shadow-blue-100">Send</button>
            </div>
        </div>
    </div>

    <script>
        const avatarSeeds = ['Leo', 'Misty', 'Jasper', 'Nala', 'Felix', 'Bella', 'Simba', 'Oliver'];
        let selectedAvatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${avatarSeeds[0]}`;

        // Data Management
        let accounts = JSON.parse(localStorage.getItem('connect_accounts')) || [];
        let currentUserEmail = localStorage.getItem('connect_active_session') || null;
        let mails = JSON.parse(localStorage.getItem('connect_mails')) || [];
        
        let activeFolder = 'inbox';
        let selectedMail = null;

        function init() {
            setupAvatarGrid();
            if (currentUserEmail) {
                const user = accounts.find(a => a.email === currentUserEmail);
                if (user) {
                    showApp();
                } else {
                    showLogin();
                }
            } else {
                showLogin();
            }
            lucide.createIcons();
        }

        function showLogin() {
            document.getElementById('auth-overlay').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('register-container').classList.add('hidden');

            const section = document.getElementById('accounts-list-section');
            const grid = document.getElementById('accounts-grid');
            
            if (accounts.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = accounts.map(acc => `
                    <div onclick="loginAs('${acc.email}')" class="account-card flex items-center gap-4 p-3 border border-slate-100 rounded-xl cursor-pointer transition-all">
                        <img src="${acc.avatar}" class="w-10 h-10 rounded-full object-cover">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-slate-800 truncate">${acc.name}</p>
                            <p class="text-xs text-slate-400 truncate">${acc.email}</p>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                    </div>
                `).join('');
                lucide.createIcons();
            } else {
                section.classList.add('hidden');
            }
        }

        function showRegistration() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('register-container').classList.remove('hidden');
        }

        function showApp() {
            const user = accounts.find(a => a.email === currentUserEmail);
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('display-name').textContent = user.name;
            document.getElementById('display-email').textContent = user.email;
            document.getElementById('display-avatar').src = user.avatar;
            
            renderList();
            lucide.createIcons();
        }

        function loginAs(email) {
            currentUserEmail = email;
            localStorage.setItem('connect_active_session', email);
            showApp();
        }

        function logout() {
            currentUserEmail = null;
            localStorage.removeItem('connect_active_session');
            selectedMail = null;
            document.getElementById('active-view').classList.add('hidden');
            document.getElementById('empty-view').classList.remove('hidden');
            showLogin();
        }

        function setupAvatarGrid() {
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = avatarSeeds.map((seed, index) => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
                return `
                    <div onclick="selectAvatar('${url}', this)" class="avatar-option rounded-2xl bg-slate-100 p-1 overflow-hidden ${index === 0 ? 'selected' : ''}">
                        <img src="${url}" class="w-full h-full object-cover">
                    </div>
                `;
            }).join('');
        }

        window.selectAvatar = (url, el) => {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedAvatarUrl = url;
        };

        function registerUser() {
            const name = document.getElementById('reg-name').value.trim();
            const emailInput = document.getElementById('reg-email').value.trim().toLowerCase();
            const fullEmail = emailInput + "@connect.pro";

            if (!name || !emailInput) {
                alert("Please fill in all fields!");
                return;
            }

            if (accounts.some(a => a.email === fullEmail)) {
                alert("This email is already taken!");
                return;
            }

            const newUser = { name, email: fullEmail, avatar: selectedAvatarUrl };
            accounts.push(newUser);
            localStorage.setItem('connect_accounts', JSON.stringify(accounts));
            
            // Welcome Email
            mails.push({
                id: Date.now(),
                from: "Connect Support",
                fromEmail: "support@connect.pro",
                fromAvatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix",
                to: fullEmail,
                subject: "Account Created!",
                body: `Welcome ${name}!\n\nYour account is now stored locally. You can log out and switch between accounts anytime from the login screen.\n\nEnjoy ConnectMailPro!`,
                date: new Date().toLocaleString(),
                starred: false,
                read: false
            });
            localStorage.setItem('connect_mails', JSON.stringify(mails));

            loginAs(fullEmail);
        }

        function switchFolder(folder) {
            activeFolder = folder;
            document.getElementById('folder-title').textContent = folder;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600/10', 'text-blue-400');
                btn.classList.add('hover:bg-slate-800', 'text-slate-400');
            });
            document.getElementById(`btn-${folder}`).classList.add('bg-blue-600/10', 'text-blue-400');
            renderList();
        }

        function renderList() {
            const listContainer = document.getElementById('email-list');
            listContainer.innerHTML = '';
            
            const filtered = mails.filter(m => {
                if (activeFolder === 'inbox') return m.to === currentUserEmail;
                if (activeFolder === 'sent') return m.fromEmail === currentUserEmail;
                if (activeFolder === 'starred') return m.starred && (m.to === currentUserEmail || m.fromEmail === currentUserEmail);
                return true;
            }).reverse();

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="p-12 text-center text-slate-400">No messages found</div>`;
                return;
            }

            filtered.forEach(m => {
                const item = document.createElement('div');
                item.className = `p-4 border-b border-slate-100 cursor-pointer transition-all hover:bg-white email-item ${selectedMail?.id === m.id ? 'active' : ''}`;
                item.onclick = () => openMail(m);
                item.innerHTML = `
                    <div class="flex gap-3">
                        <img src="${m.fromAvatar}" class="w-10 h-10 rounded-xl bg-slate-200 object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-bold truncate text-slate-900">${m.from}</span>
                                <span class="text-[10px] text-slate-400">${m.date.split(',')[1]}</span>
                            </div>
                            <h4 class="text-xs font-semibold truncate text-slate-700">${m.subject}</h4>
                            <p class="text-xs text-slate-400 truncate">${m.body}</p>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function openMail(mail) {
            selectedMail = mail;
            document.getElementById('empty-view').classList.add('hidden');
            const view = document.getElementById('active-view');
            view.classList.remove('hidden');

            document.getElementById('view-subject').textContent = mail.subject;
            document.getElementById('view-from').textContent = `${mail.from} <${mail.fromEmail}>`;
            document.getElementById('view-body').textContent = mail.body;
            document.getElementById('view-date').textContent = mail.date;
            document.getElementById('view-avatar-img').src = mail.fromAvatar;
            
            const starBtn = document.getElementById('star-btn');
            starBtn.className = `p-2 hover:bg-slate-100 rounded-lg ${mail.starred ? 'text-amber-400' : 'text-slate-400'}`;
            starBtn.innerHTML = `<i data-lucide="star" class="w-5 h-5" ${mail.starred ? 'fill="currentColor"' : ''}></i>`;
            
            lucide.createIcons();
            renderList();
        }

        function sendMail() {
            const to = document.getElementById('to-email').value.trim();
            const subject = document.getElementById('to-subject').value.trim();
            const body = document.getElementById('to-body').value.trim();
            const user = accounts.find(a => a.email === currentUserEmail);

            if (!to || !subject || !body) {
                alert("Please fill in all fields.");
                return;
            }

            const fullTo = to.includes('@') ? to : to + "@connect.pro";

            mails.push({
                id: Date.now(),
                from: user.name,
                fromEmail: user.email,
                fromAvatar: user.avatar,
                to: fullTo,
                subject,
                body,
                date: new Date().toLocaleString(),
                starred: false
            });

            localStorage.setItem('connect_mails', JSON.stringify(mails));
            toggleCompose(false);
            document.getElementById('to-email').value = '';
            document.getElementById('to-subject').value = '';
            document.getElementById('to-body').value = '';
            renderList();
            alert("Message Sent!");
        }

        function toggleCompose(show) { document.getElementById('compose-modal').classList.toggle('hidden', !show); }
        function toggleSidebar() { 
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-20');
            document.querySelectorAll('.sidebar-text').forEach(t => t.classList.toggle('hidden'));
        }

        function deleteCurrentEmail() {
            if (!selectedMail) return;
            mails = mails.filter(m => m.id !== selectedMail.id);
            localStorage.setItem('connect_mails', JSON.stringify(mails));
            selectedMail = null;
            document.getElementById('active-view').classList.add('hidden');
            document.getElementById('empty-view').classList.remove('hidden');
            renderList();
        }

        function toggleStarCurrent() {
            if (!selectedMail) return;
            const idx = mails.findIndex(m => m.id === selectedMail.id);
            mails[idx].starred = !mails[idx].starred;
            localStorage.setItem('connect_mails', JSON.stringify(mails));
            openMail(mails[idx]);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
