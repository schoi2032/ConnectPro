<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPro | Terminal</title>
    <!-- Reliable CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .blue-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .msg-me { background: #2563eb; border-radius: 18px 18px 4px 18px; }
        .msg-them { background: #334155; border-radius: 18px 18px 18px 4px; }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .avatar-box { transition: all 0.2s; cursor: pointer; border: 3px solid transparent; }
        .avatar-box.selected { border-color: #3b82f6; transform: scale(1.05); background: #1e293b; }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 p-4">
        <div id="auth-card" class="glass w-full max-w-md p-8 rounded-[2.5rem] text-center shadow-2xl">
            <div class="blue-gradient w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                <i data-lucide="zap" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight mb-2">ConnectPro</h1>
            <p class="text-slate-400 text-sm font-medium mb-8">Secure Communication Node</p>

            <div id="user-selector" class="mb-6 space-y-3 hidden">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Stored Sessions</p>
                <div id="user-list" class="max-h-40 overflow-y-auto custom-scrollbar space-y-2"></div>
                <div class="py-4 flex items-center gap-4 text-slate-600"><hr class="flex-1 border-slate-800"> OR <hr class="flex-1 border-slate-800"></div>
            </div>

            <button onclick="toggleRegister(true)" class="w-full py-4 rounded-xl bg-slate-800 hover:bg-slate-700 font-bold transition-all flex items-center justify-center gap-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Create New ID
            </button>
        </div>

        <!-- REGISTRATION MODAL -->
        <div id="reg-modal" class="hidden glass w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-black mb-2">Initialize Identity</h2>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-4 text-center">Select Profile Picture</p>
            <div class="grid grid-cols-4 gap-3 mb-6 max-h-48 overflow-y-auto p-2 custom-scrollbar bg-slate-900/30 rounded-2xl" id="avatar-grid"></div>
            
            <div class="space-y-3">
                <input type="text" id="reg-name" placeholder="Display Name" class="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                <div class="relative mb-6">
                    <input type="text" id="reg-handle" placeholder="username" class="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold pr-32">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-xs">@connect.pro</span>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="toggleRegister(false)" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                <button onclick="handleSignup()" class="flex-1 py-4 blue-gradient rounded-xl font-black shadow-lg shadow-blue-500/20">Launch</button>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="app-interface" class="hidden flex h-screen w-full">
        <!-- Sidebar -->
        <div class="w-20 lg:w-72 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-6 flex items-center gap-4">
                <div class="blue-gradient w-10 h-10 rounded-xl flex items-center justify-center shrink-0">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <span class="hidden lg:block font-black text-xl tracking-tighter">ConnectPro</span>
            </div>

            <nav class="flex-1 px-4 space-y-2 mt-4">
                <button onclick="switchTab('mail')" id="btn-mail" class="w-full p-4 rounded-xl flex items-center gap-4 transition-all font-bold tab-active">
                    <i data-lucide="mail" class="w-5 h-5"></i>
                    <span class="hidden lg:block text-sm">Transmissions</span>
                </button>
                <button onclick="switchTab('chat')" id="btn-chat" class="w-full p-4 rounded-xl flex items-center gap-4 transition-all font-bold text-slate-400 hover:bg-slate-800">
                    <i data-lucide="message-circle" class="w-5 h-5"></i>
                    <span class="hidden lg:block text-sm">Active Nodes</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <div class="bg-slate-800/50 p-3 rounded-2xl flex items-center gap-3">
                    <img id="user-avatar" src="" class="w-10 h-10 rounded-xl bg-slate-700">
                    <div class="hidden lg:block overflow-hidden">
                        <p id="user-name" class="font-bold text-sm truncate"></p>
                        <p id="user-email" class="text-[10px] text-slate-500 truncate"></p>
                    </div>
                    <button onclick="logout()" class="ml-auto p-2 hover:text-red-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-950">
            <!-- Mail View -->
            <div id="view-mail" class="flex h-full">
                <div class="w-full md:w-80 border-r border-slate-900 flex flex-col">
                    <div class="p-6">
                        <button onclick="openModal('compose')" class="w-full py-4 blue-gradient rounded-xl font-black text-sm shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> New Message
                        </button>
                    </div>
                    <div id="inbox-list" class="flex-1 overflow-y-auto custom-scrollbar px-4 space-y-2"></div>
                </div>
                <div class="hidden md:flex flex-1 items-center justify-center p-12 text-center text-slate-600">
                    <div id="mail-reader-empty">
                        <i data-lucide="mail-open" class="w-16 h-16 mx-auto mb-4 opacity-20"></i>
                        <p class="font-bold">Select a transmission to decrypt</p>
                    </div>
                    <div id="mail-reader-content" class="hidden w-full max-w-2xl text-left bg-slate-900/50 p-10 rounded-3xl border border-slate-800"></div>
                </div>
            </div>

            <!-- Chat View -->
            <div id="view-chat" class="hidden flex h-full">
                <div class="w-full md:w-80 border-r border-slate-900 flex flex-col">
                    <div class="p-6">
                        <button onclick="openModal('room')" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-black text-sm flex items-center justify-center gap-2">
                            <i data-lucide="hash" class="w-4 h-4"></i> Join Node
                        </button>
                    </div>
                    <div id="room-list" class="flex-1 overflow-y-auto custom-scrollbar px-4 space-y-2"></div>
                </div>
                <div id="chat-window" class="flex-1 flex flex-col">
                    <div id="chat-empty" class="flex-1 flex flex-col items-center justify-center text-slate-600">
                        <i data-lucide="message-square" class="w-16 h-16 mb-4 opacity-20"></i>
                        <p class="font-bold">No Node Connected</p>
                    </div>
                    <div id="chat-active" class="hidden flex-1 flex flex-col">
                        <div class="p-6 border-b border-slate-900 bg-slate-900/30 flex justify-between items-center">
                            <h2 id="active-room-title" class="font-black text-xl"></h2>
                            <span class="text-[10px] font-bold text-green-500 bg-green-500/10 px-3 py-1 rounded-full uppercase tracking-tighter">Live Connection</span>
                        </div>
                        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"></div>
                        <div class="p-6 bg-slate-900/50">
                            <div class="flex gap-4">
                                <input type="text" id="chat-input" placeholder="Secure message..." class="flex-1 p-4 rounded-xl outline-none">
                                <button onclick="sendMsg()" class="w-14 h-14 blue-gradient rounded-xl flex items-center justify-center shadow-lg"><i data-lucide="send" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <!-- Compose -->
        <div id="modal-compose" class="hidden glass w-full max-w-xl p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-black mb-6">New Transmission</h2>
            <input type="text" id="mail-to" placeholder="Recipient username" class="w-full p-4 rounded-xl mb-3 outline-none">
            <input type="text" id="mail-sub" placeholder="Subject" class="w-full p-4 rounded-xl mb-3 outline-none">
            <textarea id="mail-body" placeholder="Message content..." class="w-full p-4 rounded-xl h-48 mb-4 outline-none resize-none"></textarea>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400">Discard</button>
                <button onclick="handleSendMail()" class="flex-1 py-4 blue-gradient rounded-xl font-black shadow-lg">Transmit</button>
            </div>
        </div>
        <!-- Room Join -->
        <div id="modal-room" class="hidden glass w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Connect to Node</h2>
            <input type="text" id="room-name" placeholder="Room Name" class="w-full p-4 rounded-xl mb-3 outline-none">
            <input type="password" id="room-key" placeholder="Access Key" class="w-full p-4 rounded-xl mb-6 outline-none">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                <button onclick="handleRoomJoin()" class="flex-1 py-4 blue-gradient rounded-xl font-black shadow-lg">Authenticate</button>
            </div>
        </div>
    </div>

    <script>
        // Expanded State - Diversified Avatars
        const AVATARS = [
            'Aria', 'Luna', 'Cleo', 'Zoey', 'Bella', 'Maya', 'Sasha', 'Nala',
            'Jasper', 'Felix', 'Simba', 'Oliver', 'Max', 'Toby', 'Oscar', 'Finn',
            'Ruby', 'Jade', 'Skye', 'Ivy', 'Leo', 'Milo', 'Arlo', 'Kai'
        ];
        let db = { users: [], mails: [], rooms: [], msgs: {} };
        let currentUser = null;
        let selectedAvatar = `https://api.dicebear.com/7.x/notionists/svg?seed=Aria`;
        let activeRoom = null;

        // Initialization
        window.onload = () => {
            const saved = localStorage.getItem('cp_db');
            if (saved) db = JSON.parse(saved);
            
            initAvatars();
            checkSession();
            lucide.createIcons();
            
            document.getElementById('chat-input').addEventListener('keypress', e => e.key === 'Enter' && sendMsg());
        };

        function save() { localStorage.setItem('cp_db', JSON.stringify(db)); }

        function checkSession() {
            const sid = localStorage.getItem('cp_sid');
            if (sid) {
                const user = db.users.find(u => u.email === sid);
                if (user) login(user);
            } else {
                renderUserList();
            }
        }

        function initAvatars() {
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = AVATARS.map((s, i) => {
                const url = `https://api.dicebear.com/7.x/notionists/svg?seed=${s}`;
                return `<div onclick="selectAvatar('${url}', this)" class="avatar-box bg-slate-800/50 p-1.5 rounded-xl border-2 ${i===0?'selected':''}"><img src="${url}" class="w-full h-full rounded-lg"></div>`;
            }).join('');
        }

        function selectAvatar(url, el) {
            selectedAvatar = url;
            document.querySelectorAll('.avatar-box').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function toggleRegister(show) {
            document.getElementById('auth-card').classList.toggle('hidden', show);
            document.getElementById('reg-modal').classList.toggle('hidden', !show);
        }

        function handleSignup() {
            const name = document.getElementById('reg-name').value.trim();
            const handle = document.getElementById('reg-handle').value.trim().toLowerCase();
            if (!name || !handle) return;
            const email = handle + "@connect.pro";
            if (db.users.find(u => u.email === email)) return alert("ID Taken");
            const user = { name, email, avatar: selectedAvatar };
            db.users.push(user);
            save();
            login(user);
        }

        function login(user) {
            currentUser = user;
            localStorage.setItem('cp_sid', user.email);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-interface').classList.remove('hidden');
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-avatar').src = user.avatar;
            renderInbox();
            renderRooms();
            lucide.createIcons();
        }

        function logout() {
            localStorage.removeItem('cp_sid');
            location.reload();
        }

        function renderUserList() {
            const list = document.getElementById('user-list');
            if (db.users.length > 0) {
                document.getElementById('user-selector').classList.remove('hidden');
                list.innerHTML = db.users.map(u => `
                    <div onclick='login(${JSON.stringify(u)})' class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-xl cursor-pointer hover:bg-slate-700 transition-all border border-slate-700">
                        <img src="${u.avatar}" class="w-8 h-8 rounded-lg bg-slate-900">
                        <div class="text-left"><p class="text-xs font-bold">${u.name}</p><p class="text-[9px] text-slate-500">${u.email}</p></div>
                    </div>`).join('');
            }
        }

        function switchTab(tab) {
            document.getElementById('view-mail').classList.toggle('hidden', tab !== 'mail');
            document.getElementById('view-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('btn-mail').className = `w-full p-4 rounded-xl flex items-center gap-4 transition-all font-bold ${tab==='mail'?'tab-active':'text-slate-400 hover:bg-slate-800'}`;
            document.getElementById('btn-chat').className = `w-full p-4 rounded-xl flex items-center gap-4 transition-all font-bold ${tab==='chat'?'tab-active':'text-slate-400 hover:bg-slate-800'}`;
            lucide.createIcons();
        }

        function openModal(id) {
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-compose').classList.toggle('hidden', id !== 'compose');
            document.getElementById('modal-room').classList.toggle('hidden', id !== 'room');
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function handleSendMail() {
            const to = document.getElementById('mail-to').value.trim();
            const sub = document.getElementById('mail-sub').value.trim();
            const body = document.getElementById('mail-body').value.trim();
            if (!to || !sub || !body) return;
            const fullTo = to.includes('@') ? to : to + "@connect.pro";
            db.mails.push({ id: Date.now(), from: currentUser.email, fromName: currentUser.name, fromAvatar: currentUser.avatar, to: fullTo, sub, body, date: new Date().toISOString() });
            save();
            closeModal();
            renderInbox();
        }

        function renderInbox() {
            const list = document.getElementById('inbox-list');
            const myMails = db.mails.filter(m => m.to === currentUser.email).reverse();
            list.innerHTML = myMails.length ? myMails.map(m => `
                <div onclick="readMail(${m.id})" class="p-4 rounded-2xl bg-slate-900/50 hover:bg-slate-800 cursor-pointer border border-slate-800 transition-all">
                    <p class="text-[10px] font-bold text-blue-400 mb-1">${m.fromName}</p>
                    <p class="text-xs font-bold truncate">${m.sub}</p>
                </div>`).join('') : '<p class="text-center text-[10px] text-slate-600 mt-10">NO TRANSMISSIONS</p>';
        }

        function readMail(id) {
            const m = db.mails.find(x => x.id === id);
            document.getElementById('mail-reader-empty').classList.add('hidden');
            const content = document.getElementById('mail-reader-content');
            content.classList.remove('hidden');
            content.innerHTML = `<h2 class="text-3xl font-black mb-6">${m.sub}</h2>
                <div class="flex items-center gap-4 mb-8 p-4 bg-slate-950 rounded-2xl border border-slate-800">
                    <img src="${m.fromAvatar}" class="w-10 h-10 rounded-lg">
                    <div><p class="font-bold text-sm">${m.fromName}</p><p class="text-[10px] text-slate-500">${m.from}</p></div>
                </div>
                <div class="text-slate-300 leading-relaxed whitespace-pre-wrap">${m.body}</div>`;
        }

        function handleRoomJoin() {
            const name = document.getElementById('room-name').value.trim();
            const key = document.getElementById('room-key').value.trim();
            if (!name || !key) return;
            let room = db.rooms.find(r => r.name.toLowerCase() === name.toLowerCase());
            if (room && room.key !== key) return alert("Wrong Key");
            if (!room) { room = { id: 'r'+Date.now(), name, key }; db.rooms.push(room); db.msgs[room.id] = []; }
            save();
            selectRoom(room.id);
            closeModal();
        }

        function renderRooms() {
            const list = document.getElementById('room-list');
            list.innerHTML = db.rooms.map(r => `
                <div onclick="selectRoom('${r.id}')" class="p-4 rounded-xl cursor-pointer ${activeRoom===r.id?'bg-blue-600':'bg-slate-900/50 hover:bg-slate-800'} transition-all flex items-center gap-3">
                    <i data-lucide="hash" class="w-4 h-4"></i><span class="text-xs font-bold">${r.name}</span>
                </div>`).join('');
            lucide.createIcons();
        }

        function selectRoom(id) {
            activeRoom = id;
            const room = db.rooms.find(r => r.id === id);
            document.getElementById('chat-empty').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('active-room-title').textContent = room.name;
            renderRooms();
            renderMsgs();
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if (!val || !activeRoom) return;
            if (!db.msgs[activeRoom]) db.msgs[activeRoom] = [];
            db.msgs[activeRoom].push({ sender: currentUser.email, name: currentUser.name, avatar: currentUser.avatar, text: val });
            save();
            input.value = '';
            renderMsgs();
        }

        function renderMsgs() {
            const container = document.getElementById('chat-messages');
            const msgs = db.msgs[activeRoom] || [];
            container.innerHTML = msgs.map(m => {
                const isMe = m.sender === currentUser.email;
                return `<div class="flex flex-col ${isMe?'items-end':'items-start'}">
                    <span class="text-[9px] font-bold text-slate-500 mb-1 px-2 uppercase">${m.name}</span>
                    <div class="px-5 py-3 text-sm font-medium max-w-[80%] ${isMe?'msg-me text-white':'msg-them text-slate-200'}">${m.text}</div>
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
